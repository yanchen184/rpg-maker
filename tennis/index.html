    <style>
      html, body { margin: 0; padding: 0; background: #14210f; height: 100%; overflow: hidden; }
      #app { width: 100%; height: 100%; }
      canvas { image-rendering: pixelated; }
      /* 首屏載入畫面:純 CSS,不等 JS/資產 */
      #loading {
        position: fixed; inset: 0; z-index: 100;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #14210f; color: #e8f0dc;
        font: 15px/1.6 monospace; user-select: none;
        transition: opacity .45s ease;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      #loading .logo { font-size: 40px; letter-spacing: 2px; }
      #loading .spinner {
        width: 44px; height: 44px; border-radius: 50%;
        border: 4px solid #2a3d1e; border-top-color: #b8e058;
        animation: spin 0.8s linear infinite;
      }
      #loading .tip { color: #93a878; font-size: 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* 記分板(網球計分:局數 + 分數) */
      #scoreboard {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 20;
        background: #101a0cd8; border: 1px solid #35502a; border-radius: 12px;
        color: #e8f0dc; font: 14px/1.5 monospace; padding: 8px 18px;
        display: none; text-align: center; user-select: none; white-space: nowrap;
      }
      #scoreboard .pts { font-size: 22px; letter-spacing: 2px; color: #d8ff70; }
      #scoreboard .games { color: #93a878; font-size: 12px; }
      #scoreboard .serve { color: #ffd670; font-size: 12px; }

      /* 底部提示浮條(發球/揮拍提示) */
      #hint {
        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 20;
        background: #101a0cd8; border: 1px solid #35502a; border-radius: 10px;
        color: #ffe9a8; font: 14px/1.4 monospace; padding: 8px 16px;
        display: none; user-select: none; white-space: nowrap;
      }

      /* 得分快報(短暫置中閃現) */
      #flash {
        position: fixed; left: 50%; top: 34%; transform: translate(-50%, -50%); z-index: 30;
        color: #fff; font: bold 34px/1.3 monospace; text-shadow: 0 2px 12px #000c;
        display: none; user-select: none; text-align: center; white-space: nowrap;
      }

      /* 等待對手 / 房間連結 overlay */
      #lobby {
        position: fixed; inset: 0; z-index: 50;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; background: #14210fee; color: #e8f0dc; font: 15px/1.7 monospace;
      }
      #lobby .big { font-size: 30px; }
      #lobby input {
        width: min(520px, 82vw); background: #0c140a; color: #d8ff70;
        border: 1px solid #35502a; border-radius: 8px; padding: 9px 12px; font: 13px monospace;
      }
      #lobby button {
        background: #2a3d1e; color: #e8f0dc; border: 1px solid #4a6a38; border-radius: 8px;
        padding: 8px 22px; font: 14px monospace; cursor: pointer;
      }
      #lobby button:hover { background: #35502a; }
      #lobby .tip { color: #93a878; font-size: 12px; }
      #lobby .modes { display: flex; gap: 12px; margin-top: 6px; }
      #lobby .modes button { background: #1e2f3d; border-color: #38566a; }
      #lobby .modes button:hover { background: #2a4050; }
    </style>
    <script type="module" crossorigin src="./assets/index-C_xher85.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="scoreboard"></div>
    <div id="hint"></div>
    <div id="flash"></div>
    <div id="lobby">
      <div class="big">🎾 網球對戰</div>
      <div id="lobby-msg">建立房間中…</div>
      <input id="lobby-link" readonly value="" />
      <button id="lobby-copy">複製對戰連結</button>
      <div class="tip">把連結傳給對手,兩人連上就開打。移動:WASD / 方向鍵;發球與揮拍:空白鍵。</div>
      <div class="modes">
        <button id="mode-ai-easy">🤖 AI:簡單</button>
        <button id="mode-ai">🤖 AI:普通</button>
        <button id="mode-ai-hard">🤖 AI:困難</button>
        <button id="mode-watch">👀 觀戰:AI 對打 AI</button>
      </div>
      <div class="tip">不想等人?挑個難度跟 AI 打一場(遊戲中按 1/2/3 也能切),或看兩隻 AI 對轟。</div>
    </div>
    <div id="loading">
      <div class="logo">🎾 Tennis</div>
      <div class="spinner"></div>
      <div class="tip">載入球場與角色素材中…</div>
    </div>
  </body>
</html>
