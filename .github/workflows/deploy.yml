name: Deploy to GitHub Pages

# push 到 master 就自動 build + 部署到 gh-pages 分支。
# 以前只有手動 npm run build + 手動推 gh-pages,常發生「master 改了但線上沒更新」。
on:
  push:
    branches: [master]
  workflow_dispatch: {}  # 允許手動觸發

permissions:
  contents: write  # peaceiris 要 push 回 gh-pages 分支

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      # 網球對戰掛在 /rpg-maker/tennis/ 子路徑(vite base './' 相對路徑,搬進子資料夾即可跑)。
      # publicDir 會整包拷 assets/,先剪掉素材管線中間產物(raw/generated 等 ~44MB),遊戲只吃 sprites+scenes+manifest。
      - name: Bundle tennis under /tennis/
        run: |
          rm -rf apps/tennis/dist/{raw,raw-original,generated,queue,prompts}
          cp -r apps/tennis/dist apps/escape-room/dist/tennis

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/escape-room/dist
          publish_branch: gh-pages
